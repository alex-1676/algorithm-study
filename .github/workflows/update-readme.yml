name: Update README

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 전체 커밋 히스토리를 가져옴

      - name: Run update script
        run: python3 update_readme.py

      - name: Commit and push
        run: |
          git config user.name "hoyoung"
          git config user.email "a01066651676@gmail.com"
          git pull --rebase origin main
          git add README.md
          git diff --cached --quiet || git commit -m "[AUTO] README 업데이트"
          git push